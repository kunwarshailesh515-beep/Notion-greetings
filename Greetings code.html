<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Greeting</title>
    <style>
        :root {
            --bg-color: #191919;
            --text-color: #ffffff;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #ffffff;
                --text-color: #37352f;
            }
        }

        body {
            background-color: transparent; 
            color: var(--text-color);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #greeting-container {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .sub-greeting {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="greeting-container">
        <div id="main-greeting">Good Morning</div>
        <div id="sub-greeting" class="sub-greeting">Let's get to work!</div>
    </div>

    <script>
        const translations = {
            en: { // English
                morning: "Good Morning", afternoon: "Good Afternoon", evening: "Good Evening", night: "Good Night",
                weekend: "Have a great weekend!", workday: "Let's get to work!",
                newYear: "Happy New Year!", halloween: "Happy Halloween!", christmas: "Merry Christmas!"
            },
            es: { // Spanish
                morning: "Buenos días", afternoon: "Buenas tardes", evening: "Buenas noches", night: "Buenas noches",
                weekend: "¡Buen fin de semana!", workday: "¡A trabajar!",
                newYear: "¡Feliz Año Nuevo!", halloween: "¡Feliz Halloween!", christmas: "¡Feliz Navidad!"
            },
            ru: { // Russian
                morning: "Доброе утро", afternoon: "Добрый день", evening: "Добрый вечер", night: "Спокойной ночи",
                weekend: "Хороших выходных!", workday: "За работу!",
                newYear: "С Новым годом!", halloween: "Счастливого Хэллоуина!", christmas: "С Рождеством!"
            },
            zh: { // Chinese (Simplified)
                morning: "早上好", afternoon: "下午好", evening: "晚上好", night: "晚安",
                weekend: "周末愉快！", workday: "开始工作吧！",
                newYear: "新年快乐！", halloween: "万圣节快乐！", christmas: "圣诞快乐！"
            },
            fr: { // French
                morning: "Bonjou", afternoon: "Bon après-midi", evening: "Bonsoir", night: "Bonne nuit",
                weekend: "Passez un bon week-end !", workday: "Au travail !",
                newYear: "Bonne année !", halloween: "Joyeux Halloween !", christmas: "Joyeux Noël !"
            },
            de: { // German
                morning: "Guten Morgen", afternoon: "Guten Tag", evening: "Guten Abend", night: "Gute Nacht",
                weekend: "Schönes Wochenende!", workday: "Lass uns an die Arbeit gehen!",
                newYear: "Frohes neues Jahr!", halloween: "Fröhliches Halloween!", christmas: "Frohe Weihnachten!"
            },
            ja: { // Japanese
                morning: "おはようございます", afternoon: "こんにちは", evening: "こんばんは", night: "おやすみなさい",
                weekend: "良い週末を！", workday: "仕事を始めましょう！",
                newYear: "新年あけましておめでとうございます！", halloween: "ハッピーハロウィン！", christmas: "メリークリスマス！"
            },
            pt: { // Portuguese
                morning: "Bom dia", afternoon: "Boa tarde", evening: "Boa noite", night: "Boa noite",
                weekend: "Bom fim de semana!", workday: "Vamos ao trabalho!",
                newYear: "Feliz Ano Novo!", halloween: "Feliz Halloween!", christmas: "Feliz Natal!"
            },
            ar: { // Arabic
                morning: "صباح الخير", afternoon: "مساء الخير", evening: "مساء الخير", night: "تصبح على خير",
                weekend: "أتمنى لك عطلة نهاية أسبوع سعيدة!", workday: "فلنبدأ العمل!",
                newYear: "سنة جديدة سعيدة!", halloween: "هالوين سعيد!", christmas: "عيد ميلاد مجيد!"
            },
            hi: { // Hindi
                morning: "सुप्रभात", afternoon: "नमस्कार", evening: "शुभ संध्या", night: "शुभ रात्रि",
                weekend: "सप्ताहांत शुभ हो!", workday: "चलिए काम शुरू करते हैं!",
                newYear: "नया साल मुबारक हो!", halloween: "हैप्पी हैलोवीन!", christmas: "क्रिसमस की शुभकामनाएँ!"
            }
        };

        function getGreeting() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay(); 
            const month = now.getMonth() + 1; 
            const date = now.getDate();

            // Extract the two-letter language code
            const userLang = (navigator.language || navigator.userLanguage).slice(0, 2);
            
            // Fallback to English if the user's language isn't supported in our dictionary
            const text = translations[userLang] || translations['en'];
            
            let mainStr = "";
            let subStr = "";

            // 1. Holiday Check
            if (month === 1 && date === 1) {
                mainStr = text.newYear;
            } else if (month === 10 && date === 31) {
                mainStr = text.halloween;
            } else if (month === 12 && date === 25) {
                mainStr = text.christmas;
            } else {
                // 2. Time-of-day Check
                if (hour >= 5 && hour < 12) {
                    mainStr = text.morning;
                } else if (hour >= 12 && hour < 17) {
                    mainStr = text.afternoon;
                } else if (hour >= 17 && hour < 21) {
                    mainStr = text.evening;
                } else {
                    mainStr = text.night;
                }
            }

            // 3. Sub-greeting (Weekend vs Workday)
            if (day === 0 || day === 6) {
                subStr = text.weekend;
            } else {
                if (mainStr !== text.newYear && mainStr !== text.christmas && mainStr !== text.halloween) {
                    subStr = text.workday;
                }
            }

            document.getElementById('main-greeting').textContent = mainStr;
            document.getElementById('sub-greeting').textContent = subStr;
        }

        getGreeting();
        // Check every minute to ensure smooth transitions when time rolls over
        setInterval(getGreeting, 60000);
    </script>
</body>
</html>
